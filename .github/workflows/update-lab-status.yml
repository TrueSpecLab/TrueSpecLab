name: Update TrueSpec Lab Status
on:
  schedule:
    - cron: '0 2,14 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Gets all history so we can merge properly

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Lab Assistant Script
        run: python scripts/update_lab_status.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "TrueSpec-Bot"
          git config --global user.email "bot@truespeclab.com"
          git add README.md
          # Pull latest changes from GitHub to prevent "failed to push" errors
          git pull --rebase origin main 
          git commit -m "⚙️ Telemetry Update: Syncing with Google Drive" || echo "No changes to commit"
          git push origin main
